# Build no GitHub (Windows). Funciona com ficheiros na RAIZ ou em installer\

name: Build Windows installer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar VLC e Inno Setup
        run: choco install vlc innosetup -y
        shell: cmd

      - name: Dependências Python
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: PyInstaller (onedir)
        shell: pwsh
        run: |
          $spec = @("PINK-IPTV-onedir.spec", "installer\PINK-IPTV-onedir.spec") | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $spec) { throw "PINK-IPTV-onedir.spec não encontrado na raiz nem em installer\" }
          python -m PyInstaller --noconfirm $spec

      - name: Compilar Setup (Inno)
        shell: pwsh
        run: |
          $iss = @("PINK-IPTV-Setup.iss", "installer\PINK-IPTV-Setup.iss") | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $iss) { throw "PINK-IPTV-Setup.iss não encontrado na raiz nem em installer\" }
          $pf86 = [Environment]::GetFolderPath("ProgramFilesX86")
          $pf64 = [Environment]::GetFolderPath("ProgramFiles")
          $candidates = @(
            (Join-Path -Path $pf86 -ChildPath "Inno Setup 6\ISCC.exe"),
            (Join-Path -Path $pf64 -ChildPath "Inno Setup 6\ISCC.exe"),
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe",
            "C:\Program Files\Inno Setup 6\ISCC.exe"
          ) | Select-Object -Unique
          $iscc = $candidates | Where-Object { $_ -and (Test-Path -LiteralPath $_) } | Select-Object -First 1
          if (-not $iscc) {
            $cmd = Get-Command "ISCC.exe" -ErrorAction SilentlyContinue
            if ($cmd) { $iscc = $cmd.Source }
          }
          if (-not $iscc) { throw "ISCC.exe não encontrado. Instalação Inno (choco) falhou ou caminho diferente." }
          Write-Host "ISCC: $iscc"
          Write-Host "ISS:  $iss"
          & $iscc $iss
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup terminou com código $LASTEXITCODE" }

      - name: Artifact — instalador
        uses: actions/upload-artifact@v4
        with:
          name: PINK-IPTV-Setup
          path: dist-installer/*.exe
